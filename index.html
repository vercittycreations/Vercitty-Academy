<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080808" />
    <meta name="description" content="EduCrek-Online Learning Platform" />
    <title>EduCrek Academy</title>

    <!-- Preconnect to speed up font fetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Font strategy:
      - Load ONLY weights actually used in Tailwind config
      - Fraunces: 400,600,700 only (was loading 300,400,500,600,700,800 + italic)
      - Plus Jakarta Sans: 400,500,600,700 only (was loading 300,400,500,600,700,800 + italic)
      - JetBrains Mono: 400 only (was loading 400,500)
      - display=swap prevents FOIT (invisible text during load)
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
